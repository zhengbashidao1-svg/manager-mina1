<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マネージャーミナ</title>
</head>
<body style="margin:0; background:#f5f7fb; font-family:-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; color:#1f2a44;">

  <div style="max-width:700px; margin:0 auto; padding:20px 16px 120px;">
    <h1 style="font-size:28px; margin:12px 0 8px;">ミナと会話</h1>

    <div style="background:#ffffff; border:1px solid #dfe6ff; border-radius:24px; padding:18px; box-shadow:0 8px 24px rgba(80,100,160,0.08);">
      <div id="chatArea" style="display:flex; flex-direction:column; gap:14px; margin-bottom:18px;"></div>

      <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px;">
        <button onclick="quickTalk('疲れた')" style="padding:12px 18px; border-radius:16px; border:1px solid #dfe6ff; background:#eef3ff; font-size:16px;">疲れた</button>
        <button onclick="quickTalk('勉強したい')" style="padding:12px 18px; border-radius:16px; border:1px solid #dfe6ff; background:#eef3ff; font-size:16px;">勉強したい</button>
        <button onclick="quickTalk('雑談したい')" style="padding:12px 18px; border-radius:16px; border:1px solid #dfe6ff; background:#eef3ff; font-size:16px;">雑談したい</button>
        <button onclick="quickTalk('今週の予定は？')" style="padding:12px 18px; border-radius:16px; border:1px solid #dfe6ff; background:#eef3ff; font-size:16px;">今週の予定は？</button>
        <button onclick="quickTalk('おすすめの曲ある？')" style="padding:12px 18px; border-radius:16px; border:1px solid #dfe6ff; background:#eef3ff; font-size:16px;">おすすめの曲ある？</button>
      </div>

      <input
        id="userInput"
        type="text"
        placeholder="ミナに話しかける"
        style="width:100%; box-sizing:border-box; padding:16px; font-size:18px; border:1px solid #dfe6ff; border-radius:16px; margin-bottom:12px;"
      >

      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button
          onclick="sendMessage()"
          style="padding:14px 24px; font-size:18px; font-weight:bold; border:none; border-radius:16px; background:#5b7cff; color:white;"
        >
          送信
        </button>

        <button
          onclick="clearChat()"
          style="padding:14px 24px; font-size:18px; font-weight:bold; border:1px solid #dfe6ff; border-radius:16px; background:#ffffff; color:#1f2a44;"
        >
          会話を消す
        </button>
      </div>
    </div>
  </div>

  <script>
    let chatMessages = [];

    function nowText() {
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth() + 1;
      const d = now.getDate();
      const h = now.getHours();
      const min = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");
      return y + "/" + m + "/" + d + " " + h + ":" + min + ":" + s;
    }

    function saveMessages() {
      localStorage.setItem("minaChatMessages", JSON.stringify(chatMessages));
    }

    function renderMessages() {
      const chatArea = document.getElementById("chatArea");
      chatArea.innerHTML = "";

      chatMessages.forEach(function(message) {
        const box = document.createElement("div");
        box.style.background = message.sender === "マスター" ? "#ffffff" : "#f7f9ff";
        box.style.border = "1px solid #dfe6ff";
        box.style.borderRadius = "18px";
        box.style.padding = "14px";

        const time = document.createElement("div");
        time.style.fontSize = "12px";
        time.style.color = "#7d879c";
        time.style.marginBottom = "8px";
        time.textContent = message.time;

        const sender = document.createElement("div");
        sender.style.fontSize = "20px";
        sender.style.fontWeight = "700";
        sender.style.marginBottom = "6px";
        sender.textContent = message.sender;

        const text = document.createElement("div");
        text.style.fontSize = "18px";
        text.style.lineHeight = "1.6";
        text.textContent = message.text;

        box.appendChild(time);
        box.appendChild(sender);
        box.appendChild(text);
        chatArea.appendChild(box);
      });

      chatArea.scrollTop = chatArea.scrollHeight;
      window.scrollTo(0, document.body.scrollHeight);
    }

    function addMessage(sender, text) {
      chatMessages.push({
        sender: sender,
        text: text,
        time: nowText()
      });
      saveMessages();
      renderMessages();
    }

    function getMinaReply(message) {
      const text = message.toLowerCase();

      if (text.includes("疲れ") || text.includes("つかれ")) {
        return "今日は無理に詰め込みません。水を飲んで、やることを1つに絞りましょう。";
      }

      if (text.includes("勉強")) {
        return "いいですね。まずは10分だけやる内容を1つ決めましょう。短く始めると続きやすいです。";
      }

      if (text.includes("英語")) {
        return "英語ですね。今日は短い英文を3つだけ声に出してみましょう。過去形を1つ入れると練習になります。";
      }

      if (text.includes("眠い") || text.includes("ねむい")) {
        return "眠い時は無理をしすぎない方がいいです。5分休むか、顔を洗ってから次を決めましょう。";
      }

      if (text.includes("雑談")) {
        return "もちろんです。今日は少しでも気分がよかった瞬間はありましたか？";
      }

      if (text.includes("予定")) {
        return "今週の予定は『絶対やる1つ』と『できたらやる1つ』に分けると整えやすいです。";
      }

      if (text.includes("曲") || text.includes("音楽")) {
        return "落ち着きたい時はゆったりした曲、動きたい時はテンポが少し速い曲がおすすめです。今の気分に合わせて選びましょう。";
      }

      if (text.includes("こんばんは")) {
        return "こんばんは、マスター。今日もここまで来たのがえらいです。今の気分をひとことで教えてください。";
      }

      if (text.includes("おはよう")) {
        return "おはようございます、マスター。今日は最初の1歩を小さく決めて、気持ちよく始めましょう。";
      }

      return "わかりました。今の流れに合う形で、次の一歩を一緒に決めましょう。";
    }

    function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();

      if (message === "") {
        alert("メッセージを入れてください。");
        return;
      }

      addMessage("マスター", message);
      input.value = "";

      const reply = getMinaReply(message);

      setTimeout(function() {
        addMessage("ミナ", reply);
      }, 400);
    }

    function quickTalk(text) {
      document.getElementById("userInput").value = text;
      sendMessage();
    }

    function clearChat() {
      const ok = confirm("保存された会話を全部消しますか？");
      if (!ok) return;

      chatMessages = [];
      localStorage.removeItem("minaChatMessages");
      renderMessages();
      addMessage("ミナ", "会話履歴をリセットしました。ここからまた一緒に整えていきましょう。");
    }

    function loadMessages() {
      const saved = localStorage.getItem("minaChatMessages");

      if (saved) {
        chatMessages = JSON.parse(saved);
        renderMessages();
      } else {
        addMessage("ミナ", "マスター、ここでは会話や行動が記録として残ります。朝は朝チェック、夜は夜チェックで整えていきましょう。");
      }
    }

    document.getElementById("userInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    loadMessages();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マネージャーミナ</title>
  <meta name="theme-color" content="#eef4ff">
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#dbe7ff;
      --text:#1f2937;
      --muted:#6b7280;
      --soft:#eef4ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
    }
    .app{
      max-width:560px;
      margin:0 auto;
      min-height:100vh;
      padding:18px 16px 100px;
    }
    .title{
      font-size:28px;
      font-weight:800;
      margin:8px 0 6px;
    }
    .sub{
      color:var(--muted);
      line-height:1.6;
      margin-bottom:18px;
    }
    .hero{
      background:linear-gradient(180deg,#f9fbff,#eef4ff);
      border:1px solid var(--line);
      border-radius:24px;
      padding:20px 16px 18px;
      text-align:center;
      box-shadow:0 8px 28px rgba(31,41,55,.05);
    }
    .avatar-wrap{
      width:100%;
      max-width:440px;
      margin:0 auto 14px;
      animation:floatMina 4s ease-in-out infinite;
    }
    .avatar{
      width:100%;
      aspect-ratio:1 / 1;
      border-radius:28px;
      overflow:hidden;
      border:6px solid #fff;
      box-shadow:0 10px 24px rgba(91,124,255,.14);
      background:#fff;
    }
    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center 35%;
      display:block;
      transform-origin:center center;
      animation:breatheMina 5s ease-in-out infinite;
    }
    .mina-name{
      font-size:30px;
      font-weight:800;
      margin:12px 0 6px;
    }
    .speech{
      font-size:16px;
      line-height:1.7;
      margin:0;
    }
    .today-meta{
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      margin-top:10px;
      border:1px solid var(--line);
      background:var(--soft);
    }
    .hint{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
    }
    @keyframes floatMina{
      0%{transform:translateY(0px);}
      50%{transform:translateY(-8px);}
      100%{transform:translateY(0px);}
    }
    @keyframes breatheMina{
      0%{transform:scale(1);}
      50%{transform:scale(1.02);}
      100%{transform:scale(1);}
    }
    @media (max-width:520px){
      .title{font-size:25px}
      .mina-name{font-size:28px}
      .avatar-wrap{max-width:100%}
      .avatar{border-radius:22px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">マネージャーミナ</div>
    <div class="sub">頭が切れにくい表示に修正し、瞬きにも対応した版です。</div>

    <section class="hero">
      <div class="avatar-wrap">
        <div class="avatar">
          <img id="minaImage" src="mina1.PNG" alt="ミナ">
        </div>
      </div>

      <div class="mina-name">ミナ</div>
      <p class="speech" id="minaSpeech">読み込み中...</p>

      <div class="today-meta">
        <div class="badge" id="timeBadge">時間帯読み込み中...</div>
        <div class="badge" id="faceBadge">表情読み込み中...</div>
      </div>

      <div class="hint">
        瞬き画像を置く場合は、<br>
        <strong>mina1.PNG</strong> に対して <strong>mina1_blink.PNG</strong><br>
        のように置けば自動で瞬きします。
      </div>
    </section>
  </div>

  <script>
    const morningImages = ["mina1","mina2","mina3","mina4"];
    const eveningImages = ["mina_evening1","mina_evening2","mina_evening3","mina_evening4"];
    const nightImages = ["mina_night1","mina_night2","mina_night3","mina_night4"];

    const faceTypes = ["sleepy","smile","normal"];
    const faceJp = {
      sleepy:"眠い",
      smile:"笑顔",
      normal:"真顔"
    };

    let currentBaseImage = "";

    function getTimeRange(){
      const hour = new Date().getHours();
      if(hour >= 7 && hour < 14) return "morning";
      if(hour >= 14 && hour < 20) return "evening";
      if(hour >= 20 && hour < 24) return "night";
      return "lateNight";
    }

    function getRandomItem(array){
      return array[Math.floor(Math.random() * array.length)];
    }

    function setSpeech(range, face){
      const speech = document.getElementById("minaSpeech");
      const map = {
        morning:{
          sleepy:"まだ少し眠いけど、今日も一緒に整えていこう。",
          smile:"おはよう、マスター。今日もいい日にしようね。",
          normal:"朝です。落ち着いて一つずつ進めましょう。"
        },
        evening:{
          sleepy:"少し疲れが出る時間です。無理しすぎないで。",
          smile:"夕方です。ここまで頑張っていてえらいです。",
          normal:"夕方です。あと少し、丁寧に整えましょう。"
        },
        night:{
          sleepy:"夜です。そろそろゆっくりしても大丈夫ですよ。",
          smile:"今日もお疲れさま。少し肩の力を抜こう。",
          normal:"夜です。残りは無理なく進めましょう。"
        },
        lateNight:{
          sleepy:"もう遅いです。今日は休むのを優先しましょう。",
          smile:"眠る準備、いっしょに整えようか。",
          normal:"深夜です。無理せず、早めに休みましょう。"
        }
      };
      speech.textContent = map[range][face];
    }

    function setMinaImage(){
      const range = getTimeRange();
      const img = document.getElementById("minaImage");
      const timeBadge = document.getElementById("timeBadge");
      const faceBadge = document.getElementById("faceBadge");

      let baseList = morningImages;
      let rangeText = "朝";

      if(range === "morning"){
        baseList = morningImages;
        rangeText = "7:00〜14:00";
      }
      if(range === "evening"){
        baseList = eveningImages;
        rangeText = "14:00〜20:00";
      }
      if(range === "night"){
        baseList = morningImages;
        rangeText = "20:00〜24:00";
      }
      if(range === "lateNight"){
        baseList = nightImages;
        rangeText = "0:00〜7:00";
      }

      const baseName = getRandomItem(baseList);
      const face = getRandomItem(faceTypes);

      timeBadge.textContent = "時間帯：" + rangeText;
      faceBadge.textContent = "表情：" + faceJp[face];

      const candidates = [
        baseName + "_" + face + ".PNG",
        baseName + "_" + face + ".png",
        baseName + ".PNG",
        baseName + ".png",
        "mina.PNG",
        "mina.png"
      ];

      function tryLoad(index){
        if(index >= candidates.length) return;
        const src = candidates[index];
        const tester = new Image();
        tester.onload = function(){
          img.src = src;
          currentBaseImage = src;
        };
        tester.onerror = function(){
          tryLoad(index + 1);
        };
        tester.src = src;
      }

      tryLoad(0);
      setSpeech(range, face);
    }

    function getBlinkCandidate(src){
      if(src.endsWith(".PNG")) return src.replace(".PNG","_blink.PNG");
      if(src.endsWith(".png")) return src.replace(".png","_blink.png");
      return "";
    }

    function blinkMina(){
      if(!currentBaseImage) return;
      const img = document.getElementById("minaImage");
      const blinkSrc = getBlinkCandidate(currentBaseImage);
      if(!blinkSrc) return;

      const tester = new Image();
      tester.onload = function(){
        const original = currentBaseImage;
        img.src = blinkSrc;
        setTimeout(function(){
          img.src = original;
        },120);
      };
      tester.onerror = function(){};
      tester.src = blinkSrc;
    }

    function startBlinkLoop(){
      function scheduleNext(){
        const delay = 2500 + Math.random() * 3500;
        setTimeout(function(){
          blinkMina();
          scheduleNext();
        }, delay);
      }
      scheduleNext();
    }

    window.onload = function(){
      setMinaImage();
      startBlinkLoop();
    };
  </script>
</body>
</html>

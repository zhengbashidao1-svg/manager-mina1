<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミナAI</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: sans-serif;
  background: #f3f4f6;
}

/* アプリ全体 */
.app {
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: 90px;
}

/* キャラ */
.character {
  position: relative;
  width: 100%;
}

#base {
  width: 100%;
  display: block;
}

/* 口 */
#mouth {
  position: absolute;
  left: 50%;
  top: 58%;
  transform: translate(-50%, -50%);
  width: 18%;
}

/* セリフ */
.message {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 15px;
  font-size: 18px;
  font-weight: bold;
  line-height: 1.6;
}

/* 入力 */
.input-area {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
}

.input-wrap {
  max-width: 430px;
  margin: auto;
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  font-size: 16px;
}

button {
  padding: 10px;
}
</style>
</head>

<body>

<div class="app">
  <div class="character">
    <img src="mina_base.png" id="base">
    <img src="mouth_close.png" id="mouth">
  </div>

  <div class="message" id="message">
    おはよう、マスター。
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <input type="text" id="input" placeholder="話しかける">
    <button onclick="sendMessage()">送信</button>
  </div>
</div>

<script>
const mouth = document.getElementById("mouth");
const message = document.getElementById("message");
const input = document.getElementById("input");

const mouthImages = [
  "mouth_close.png",
  "mouth_small.png",
  "mouth_medium.png",
  "mouth_large.png"
];

let interval;

/* 口パク */
function startTalking() {
  interval = setInterval(() => {
    const i = Math.floor(Math.random() * mouthImages.length);
    mouth.src = mouthImages[i];
  }, 120);
}

function stopTalking() {
  clearInterval(interval);
  mouth.src = "mouth_close.png";
}

/* 返答 */
function reply(text) {
  text = text.toLowerCase();

  if (text.includes("おはよう")) return "おはよう、マスター。今日も少し進めよう。";
  if (text.includes("疲れ")) return "無理しすぎないで。少し休もう。";
  if (text.includes("勉強")) return "いい流れ。そのまま続けよう。";
  return "ちゃんと聞いてるよ、マスター。";
}

/* 送信 */
function sendMessage() {
  const text = input.value.trim();

  if (!text) return;

  // ユーザー発言表示
  message.textContent = "マスター：「" + text + "」";
  startTalking();

  setTimeout(() => {
    stopTalking();
  }, 1500);

  input.value = "";

  // ミナの返答
  setTimeout(() => {
    message.textContent = reply(text);
    startTalking();

    setTimeout(stopTalking, 2000);
  }, 1700);
}

/* Enterキー対応 */
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>

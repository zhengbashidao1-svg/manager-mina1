<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミナ改良版</title>

<style>
body{margin:0;background:#f4f7fc;font-family:sans-serif;}
.stage{position:relative;width:100%;height:70vh;overflow:hidden;}
.layer{position:absolute;bottom:0;width:100%;object-fit:contain;}
.comment{padding:20px;font-size:18px;font-weight:bold;}
</style>
</head>

<body>

<div class="stage">
  <img id="body" class="layer">
  <img id="face" class="layer">
  <img id="mouth" class="layer">
</div>

<div id="text" class="comment">おはよう、マスター。</div>

<input id="input" placeholder="話しかける">
<button onclick="talk()">送信</button>

<script>

function loadImg(el, name){
  const exts=[".png",".PNG",".jpg",".JPG"];
  let i=0;
  function next(){
    if(i>=exts.length)return;
    let src=name+exts[i];
    let img=new Image();
    img.onload=()=>el.src=src;
    img.onerror=()=>{i++;next();}
    img.src=src;
  }
  next();
}

let state={
  outfit:"maid",
  face:"normal"
};

function apply(){
  loadImg(body,"mina_"+state.outfit);
  loadImg(face,"face_"+state.face);
}

function mouthAnim(){
  let open=true;
  let count=0;
  let interval=setInterval(()=>{
    loadImg(mouth, open?"mouth_open":"mouth_close");
    open=!open;
    count++;
    if(count>10)clearInterval(interval);
  },120);
}

function talk(){
  let t=input.value;

  if(t.includes("疲")){
    state.face="sad";
    text.innerText="無理しなくていいよ。";
  }else if(t.includes("眠")){
    state.outfit="sleep";
    text.innerText="今日は休もう。";
  }else{
    state.face="smile";
    text.innerText="いいね、その調子。";
  }

  apply();
  mouthAnim();
}

apply();

</script>

</body>
</html>

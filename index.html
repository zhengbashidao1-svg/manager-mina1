<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミナチャット強化版</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eef4ff;
  overflow:hidden;
}
.bg-mina{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:contain;
  opacity:0.25;
  z-index:0;
}
.chat-container{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
}
.chat-log{
  flex:1;
  overflow-y:auto;
  padding:12px;
}
.msg{
  margin:8px 0;
  padding:10px 14px;
  border-radius:18px;
  max-width:75%;
}
.user{background:#dbe7ff;margin-left:auto;}
.mina{background:#fff;border:1px solid #dbe7ff;}
.input-area{
  display:flex;
  padding:10px;
  gap:8px;
  background:#fff;
}
input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
}
button{
  padding:12px 16px;
  border:none;
  border-radius:12px;
  background:#6e93ff;
  color:#fff;
}
.quick{
  display:flex;
  gap:6px;
  padding:8px;
}
.quick button{
  background:#fff;
  color:#333;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<img src="mina1.PNG" class="bg-mina">

<div class="chat-container">

<div class="chat-log" id="chatLog">
<div class="msg mina">ミナ：おはよう、マスター。今日はどんな気分？</div>
</div>

<div class="quick">
<button onclick="sendQuick('疲れた')">疲れた</button>
<button onclick="sendQuick('元気')">元気</button>
<button onclick="sendQuick('勉強したい')">勉強</button>
<button onclick="sendQuick('雑談したい')">雑談</button>
</div>

<div class="input-area">
<input id="input">
<button onclick="send()">送信</button>
</div>

</div>

<script>
function addMsg(role,text){
  const log=document.getElementById("chatLog")
  const div=document.createElement("div")
  div.className="msg "+role
  div.innerText=(role==="user"?"あなた：":"ミナ：")+text
  log.appendChild(div)
  log.scrollTop=log.scrollHeight
}

function aiReply(text){
  if(text.includes("疲")) return "それはしんどかったね。今日は一つだけやろう。"
  if(text.includes("元気")) return "いいね、その勢いで進もう。"
  if(text.includes("勉強")) return "じゃあ1問だけやろう。"
  return "もう少し教えてくれる？"
}

function send(){
  const input=document.getElementById("input")
  const text=input.value.trim()
  if(!text)return
  addMsg("user",text)
  setTimeout(()=>addMsg("mina",aiReply(text)),300)
  input.value=""
}

function sendQuick(text){
  addMsg("user",text)
  addMsg("mina",aiReply(text))
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミナ</title>
  <meta name="theme-color" content="#eef4ff">
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#dbe7ff;
      --text:#1f2937;
      --muted:#6b7280;
      --soft:#eef4ff;
      --accent:#5b7cff;
      --good:#e7f7ea;
      --good-text:#167a2f;
      --warn:#fff4db;
      --warn-text:#9a6a00;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
    }
    .app{
      max-width:560px;
      margin:0 auto;
      min-height:100vh;
      padding:18px 16px 100px;
    }
    .title{
      font-size:28px;
      font-weight:800;
      margin:8px 0 6px;
    }
    .sub{
      color:var(--muted);
      line-height:1.6;
      margin-bottom:18px;
    }
    .hero{
      background:linear-gradient(180deg,#f9fbff,#eef4ff);
      border:1px solid var(--line);
      border-radius:24px;
      padding:20px 16px 18px;
      text-align:center;
      box-shadow:0 8px 28px rgba(31,41,55,.05);
    }
    .avatar{
      width:190px;
      height:190px;
      margin:0 auto 14px;
      border-radius:50%;
      overflow:hidden;
      border:6px solid #fff;
      box-shadow:0 10px 24px rgba(91,124,255,.14);
      background:#fff;
    }
    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .mina-name{
      font-size:30px;
      font-weight:800;
      margin:2px 0 6px;
    }
    .speech{
      font-size:16px;
      line-height:1.7;
      margin:0;
    }
    .circle-menu{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-top:18px;
    }

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=manager_mina_app_v34.html">
  <title>ミナへ移動中...</title>
</head>
<body>
  <div style="max-width: 700px; margin: 20px auto; padding: 20px; background: #f7f9ff; border: 1px solid #dfe6ff; border-radius: 24px;">
  <h2 style="margin-top: 0;">ミナと会話</h2>

  <div id="chatArea" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px;">
    <div style="background: #ffffff; border: 1px solid #dfe6ff; border-radius: 18px; padding: 14px;">
      <div style="font-size: 12px; color: #888; margin-bottom: 6px;">ミナ</div>
      <div>マスター、ここでは会話や行動が記録として残ります。今日は何から整えますか？</div>
    </div>
  </div>

  <input
    id="userInput"
    type="text"
    placeholder="ミナに話しかける"
    style="width: 100%; box-sizing: border-box; padding: 16px; font-size: 18px; border: 1px solid #dfe6ff; border-radius: 16px; margin-bottom: 12px;"
  >

  <button
    onclick="sendMessage()"
    style="padding: 14px 24px; font-size: 18px; font-weight: bold; border: none; border-radius: 16px; background: #5b7cff; color: white;"
  >
    送信
  </button>
</div>

<script>
function getMinaReply(message) {
  const text = message.toLowerCase();

  if (text.includes("疲れ") || text.includes("つかれ")) {
    return "マスター、おつかれさまです。今日は頑張っています。まずは水分をとって、次にやることを1つだけ決めましょう。";
  }

  if (text.includes("勉強")) {
    return "いいですね、マスター。勉強は短く始めるのがコツです。まず10分だけやる内容を決めましょう。";
  }

  if (text.includes("英語")) {
    return "英語ですね。今日は過去形を1つ、基本文を3つだけ練習すると進みやすいです。";
  }

  if (text.includes("眠い") || text.includes("ねむい")) {
    return "眠い時は無理に気合いで押し切らない方がいいです。5分休むか、軽く顔を洗って切り替えましょう。";
  }

  if (text.includes("雑談")) {
    return "もちろんです、マスター。今日は気分が少しでも上がった瞬間はありましたか？";
  }

  if (text.includes("予定")) {
    return "予定を整えましょう。今日やることを『絶対やる1つ』『できたらやる1つ』に分けると進めやすいです。";
  }

  return "ありがとうございます、マスター。今の状態は把握しました。次は、今すぐできる小さい行動を1つ決めましょう。";
}

function addMessage(sender, text) {
  const chatArea = document.getElementById("chatArea");
  const messageBox = document.createElement("div");

  messageBox.style.background = sender === "あなた" ? "#eef3ff" : "#ffffff";
  messageBox.style.border = "1px solid #dfe6ff";
  messageBox.style.borderRadius = "18px";
  messageBox.style.padding = "14px";

  const senderLine = document.createElement("div");
  senderLine.style.fontSize = "12px";
  senderLine.style.color = "#888";
  senderLine.style.marginBottom = "6px";
  senderLine.textContent = sender;

  const textLine = document.createElement("div");
  textLine.textContent = text;

  messageBox.appendChild(senderLine);
  messageBox.appendChild(textLine);
  chatArea.appendChild(messageBox);

  chatArea.scrollTop = chatArea.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById("userInput");
  const message = input.value.trim();

  if (message === "") {
    alert("メッセージを入れてください。");
    return;
  }

  addMessage("あなた", message);

  const reply = getMinaReply(message);

  setTimeout(function() {
    addMessage("ミナ", reply);
  }, 400);

  input.value = "";
}

document.getElementById("userInput").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    sendMessage();
  }
});
</script>
  <img src="mina.PNG" style="width:200px;">
  <p>ミナを開いています...</p>
  <button onclick="talk()" style="
  width: 90%;
  max-width: 320px;
  margin: 20px auto;
  display: block;
  padding: 16px;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 16px;
  background: #ff7eb6;
  color: white;
">
  ミナと会話
</button>

<script>
function talk() {
  alert("マスター、今日もお疲れさまです。今やることを1つだけ決めましょう。");
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マネージャーミナ</title>
  <meta name="theme-color" content="#eef4ff" />
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#dbe7ff;
      --text:#1f2937;
      --muted:#6b7280;
      --soft:#eef4ff;
      --accent:#5b7cff;
      --accent-soft:#edf2ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
    }
    .app{
      max-width:560px;
      margin:0 auto;
      min-height:100vh;
      padding:18px 16px 96px;
    }
    .title{
      font-size:28px;
      font-weight:800;
      margin:8px 0 6px;
    }
    .sub{
      color:var(--muted);
      line-height:1.7;
      margin-bottom:18px;
    }
    .hero{
      background:linear-gradient(180deg,#f9fbff,#eef4ff);
      border:1px solid var(--line);
      border-radius:24px;
      padding:18px 14px 18px;
      text-align:center;
      box-shadow:0 8px 28px rgba(31,41,55,.05);
    }
    .avatar-wrap{
      width:100%;
      max-width:400px;
      margin:0 auto 14px;
      animation:floatMina 4.4s ease-in-out infinite;
    }
    .avatar{
      width:100%;
      aspect-ratio:1 / 1;
      border-radius:26px;
      overflow:hidden;
      border:6px solid #fff;
      box-shadow:0 10px 24px rgba(91,124,255,.14);
      background:#fff;
    }
    .avatar img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center center;
      display:block;
      transform-origin:center center;
      animation:breatheMina 5.2s ease-in-out infinite;
      background:#fff;
      padding:6px;
    }
    .mina-name{
      font-size:30px;
      font-weight:800;
      margin:12px 0 6px;
    }
    .speech{
      font-size:17px;
      line-height:1.8;
      margin:0;
      min-height:64px;
    }
    .today-meta{
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      margin-top:10px;
      border:1px solid var(--line);
      background:var(--soft);
    }
    .talk-box{
      margin-top:16px;
      text-align:left;
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }
    .talk-title{
      font-size:14px;
      font-weight:800;
      margin-bottom:8px;
      color:var(--muted);
    }
    .talk-main{
      font-size:16px;
      line-height:1.8;
      font-weight:700;
      min-height:58px;
    }
    .actions{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:16px;
    }
    .action-btn{
      border:none;
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 8px 12px;
      box-shadow:0 6px 16px rgba(31,41,55,.04);
      cursor:pointer;
      color:var(--text);
    }
    .action-btn:active{transform:scale(.98)}
    .action-icon{
      width:54px;
      height:54px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 8px;
      background:var(--accent-soft);
      font-size:24px;
    }
    .action-label{
      font-size:14px;
      font-weight:800;
      line-height:1.4;
    }
    .panel{
      margin-top:16px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
      box-shadow:0 8px 18px rgba(31,41,55,.04);
    }
    .panel-title{
      font-size:20px;
      font-weight:800;
      margin:0 0 10px;
    }
    .panel-text{
      font-size:16px;
      line-height:1.8;
      margin:0;
    }
    .hint{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
      line-height:1.7;
    }
    @keyframes floatMina{
      0%{transform:translateY(0)}
      50%{transform:translateY(-7px)}
      100%{transform:translateY(0)}
    }
    @keyframes breatheMina{
      0%{transform:scale(1)}
      50%{transform:scale(1.018)}
      100%{transform:scale(1)}
    }
    @media (max-width:520px){
      .title{font-size:25px}
      .mina-name{font-size:28px}
      .avatar-wrap{max-width:100%}
      .avatar{border-radius:22px}
      .actions{grid-template-columns:repeat(4,1fr);gap:8px}
      .action-label{font-size:13px}
      .action-icon{width:48px;height:48px;font-size:22px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">マネージャーミナ</div>
    <div class="sub">時間帯ごとにミナが変わって、自然な声かけと、元のような行動ボタンを使える版です。</div>

    <section class="hero">
      <div class="avatar-wrap">
        <div class="avatar">
          <img id="minaImage" src="mina1.PNG" alt="ミナ" />
        </div>
      </div>

      <div class="mina-name">ミナ</div>
      <p class="speech" id="minaSpeech">読み込み中...</p>

      <div class="today-meta">
        <div class="badge" id="timeBadge">時間帯読み込み中...</div>
        <div class="badge" id="faceBadge">表情読み込み中...</div>
      </div>

      <div class="talk-box">
        <div class="talk-title">ミナとの会話</div>
        <div class="talk-main" id="talkMain">読み込み中...</div>
      </div>

      <div class="actions">
        <button class="action-btn" onclick="setMode('talk')">
          <div class="action-icon">💬</div>
          <div class="action-label">会話</div>
        </button>
        <button class="action-btn" onclick="setMode('study')">
          <div class="action-icon">📘</div>
          <div class="action-label">勉強</div>
        </button>
        <button class="action-btn" onclick="setMode('schedule')">
          <div class="action-icon">🗓️</div>
          <div class="action-label">予定</div>
        </button>
        <button class="action-btn" onclick="setMode('record')">
          <div class="action-icon">📝</div>
          <div class="action-label">記録</div>
        </button>
      </div>

      <div class="hint">
        瞬き画像を置く場合は、<strong>mina1.PNG</strong> に対して
        <strong>mina1_blink.PNG</strong> のように置けば自動で瞬きします。
      </div>
    </section>

    <section class="panel">
      <h2 class="panel-title" id="panelTitle">会話</h2>
      <p class="panel-text" id="panelText">マスター、今の気分や、今日やりたいことを一つだけ教えてください。そこから自然に一緒に進めます。</p>
    </section>
  </div>

  <script>
    const morningImages = ["mina1","mina2","mina3","mina4"];
    const eveningImages = ["mina_evening1","mina_evening2","mina_evening3","mina_evening4"];
    const nightImages = ["mina_night1","mina_night2","mina_night3","mina_night4"];

    const faceTypes = ["sleepy","smile","normal"];
    const faceJp = { sleepy:"眠い", smile:"笑顔", normal:"真顔" };

    let currentBaseImage = "";

    function getTimeRange(){
      const hour = new Date().getHours();
      if(hour >= 7 && hour < 14) return "morning";
      if(hour >= 14 && hour < 20) return "evening";
      if(hour >= 20 && hour < 24) return "night";
      return "lateNight";
    }

    function getRandomItem(array){
      return array[Math.floor(Math.random() * array.length)];
    }

    function setSpeech(range, face){
      const speech = document.getElementById("minaSpeech");
      const map = {
        morning:{
          sleepy:"おはよう、マスター。少し眠いけど、今日はいい流れを作れそうです。",
          smile:"おはよう、マスター。今日もいい日にしようね。",
          normal:"おはよう。まずは、今日やることを一つだけ決めましょう。"
        },
        evening:{
          sleepy:"少し疲れが出る時間ですね。ここからは無理せず整えていきましょう。",
          smile:"夕方です。ここまで進めた分、ちゃんとえらいです。",
          normal:"夕方です。あと少し、静かに整えて締めましょう。"
        },
        night:{
          sleepy:"夜ですね。今日は頑張りすぎなくて大丈夫ですよ。",
          smile:"今日もお疲れさま。少し肩の力を抜きましょう。",
          normal:"夜です。残りは無理のない範囲だけで進めましょう。"
        },
        lateNight:{
          sleepy:"もう遅いです。今日は休むのを優先しましょう。",
          smile:"眠る準備、いっしょに整えようか。",
          normal:"深夜です。ここからは回復の時間にしましょう。"
        }
      };
      speech.textContent = map[range][face];
    }

    function setNaturalTalk(range, face){
      const talkMain = document.getElementById("talkMain");
      const map = {
        morning:{
          sleepy:"まだ頭が起ききっていなくても大丈夫です。朝は『今日これだけやる』を一つ決めるだけで十分ですよ。",
          smile:"朝のスタート、いい感じです。最初の15分だけ一緒に頑張る気持ちでいきましょう。",
          normal:"今の気分に合わせて進めましょう。元気があるなら前に、しんどいなら軽く整えるだけでもOKです。"
        },
        evening:{
          sleepy:"疲れてくる時間なので、ここからは詰め込みすぎない方がうまくいきます。残りを一緒に整理しましょう。",
          smile:"ここまで来たの、ちゃんと積み上がっています。最後は気持ちよく終われる形にしましょう。",
          normal:"夕方は、やることを減らすほど整いやすいです。優先順位の高いものだけ残しましょう。"
        },
        night:{
          sleepy:"もう十分頑張っています。今から無理に追い込むより、明日動ける形を作る方が強いです。",
          smile:"今日の自分をちゃんと労いながら、やさしく締めましょう。小さい達成でも十分価値があります。",
          normal:"夜は『終わらせる』より『整える』が大事です。明日の自分が楽になる形にしましょう。"
        },
        lateNight:{
          sleepy:"この時間は休む判断も立派です。寝る前に、水分だけでも整えておくと明日が楽になります。",
          smile:"もうおやすみモードで大丈夫。今日はここまでにして、体を休ませましょう。",
          normal:"深夜は回復優先です。残りは明日に回して、眠る準備に入りましょう。"
        }
      };
      talkMain.textContent = map[range][face];
    }

    function setMode(mode){
      const title = document.getElementById("panelTitle");
      const text = document.getElementById("panelText");

      const content = {
        talk:{
          title:"会話",
          text:"マスター、今の気分や、気になっていることを一つだけ教えてください。そこから自然に一緒に進めます。"
        },
        study:{
          title:"勉強",
          text:"今日はどの勉強を進めますか？ 英語、ITパスポート、読書のどれでも大丈夫です。最初の10分メニューから始めましょう。"
        },
        schedule:{
          title:"予定",
          text:"今日の予定を整理します。やることを3つまでに絞ると動きやすいです。優先順位の高い順に並べましょう。"
        },
        record:{
          title:"記録",
          text:"今日の記録を残しましょう。『できたこと1つ・疲れ具合・明日の一歩』だけでも十分です。"
        }
      };

      title.textContent = content[mode].title;
      text.textContent = content[mode].text;
    }

    function setMinaImage(){
      const range = getTimeRange();
      const img = document.getElementById("minaImage");
      const timeBadge = document.getElementById("timeBadge");
      const faceBadge = document.getElementById("faceBadge");

      let baseList = morningImages;
      let rangeText = "朝";

      if(range === "morning"){
        baseList = morningImages;
        rangeText = "7:00〜14:00";
      }
      if(range === "evening"){
        baseList = eveningImages;
        rangeText = "14:00〜20:00";
      }
      if(range === "night"){
        baseList = morningImages;
        rangeText = "20:00〜24:00";
      }
      if(range === "lateNight"){
        baseList = nightImages;
        rangeText = "0:00〜7:00";
      }

      const baseName = getRandomItem(baseList);
      const face = getRandomItem(faceTypes);

      timeBadge.textContent = "時間帯：" + rangeText;
      faceBadge.textContent = "表情：" + faceJp[face];

      const candidates = [
        baseName + "_" + face + ".PNG",
        baseName + "_" + face + ".png",
        baseName + ".PNG",
        baseName + ".png",
        "mina.PNG",
        "mina.png"
      ];

      function tryLoad(index){
        if(index >= candidates.length) return;
        const src = candidates[index];
        const tester = new Image();
        tester.onload = function(){
          img.src = src;
          currentBaseImage = src;
        };
        tester.onerror = function(){
          tryLoad(index + 1);
        };
        tester.src = src;
      }

      tryLoad(0);
      setSpeech(range, face);
      setNaturalTalk(range, face);
    }

    function getBlinkCandidate(src){
      if(src.endsWith(".PNG")) return src.replace(".PNG","_blink.PNG");
      if(src.endsWith(".png")) return src.replace(".png","_blink.png");
      return "";
    }

    function blinkMina(){
      if(!currentBaseImage) return;
      const img = document.getElementById("minaImage");
      const blinkSrc = getBlinkCandidate(currentBaseImage);
      if(!blinkSrc) return;

      const tester = new Image();
      tester.onload = function(){
        const original = currentBaseImage;
        img.src = blinkSrc;
        setTimeout(function(){
          img.src = original;
        }, 120);
      };
      tester.onerror = function(){};
      tester.src = blinkSrc;
    }

    function startBlinkLoop(){
      function scheduleNext(){
        const delay = 2500 + Math.random() * 3500;
        setTimeout(function(){
          blinkMina();
          scheduleNext();
        }, delay);
      }
      scheduleNext();
    }

    window.onload = function(){
      setMinaImage();
      startBlinkLoop();
      setMode('talk');
    };
  </script>
</body>
</html>

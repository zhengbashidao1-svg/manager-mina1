<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>マネージャーミナ</title>
<style>
:root{
  --bg:#f4f7fc; --card:rgba(255,255,255,.94); --line:#dbe7ff; --text:#1f2937; --muted:#6b7280;
  --soft:#eef4ff; --accent:#6e93ff; --shadow:0 10px 24px rgba(31,41,55,.06); --navh:88px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}
button,input{font:inherit}
.app{max-width:560px;height:100vh;margin:0 auto;padding:10px 10px calc(var(--navh) + env(safe-area-inset-bottom) + 8px);display:flex;flex-direction:column;overflow:hidden}
.screen{display:none;height:100%;min-height:0}
.screen.active{display:flex}
.home-screen{flex-direction:column}
.hero{position:relative;flex:1;min-height:0;overflow:hidden;border-radius:28px;border:1px solid var(--line);box-shadow:var(--shadow);background:linear-gradient(180deg,#fbfdff,#edf4ff)}
.bg-layer{position:absolute;inset:0;background-size:cover;background-position:center;transition:background .35s ease, background-image .35s ease}
.bg-overlay{position:absolute;inset:0;background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.36) 52%, rgba(255,255,255,.84))}
.topbar{position:absolute;top:10px;left:10px;right:10px;z-index:4;display:grid;grid-template-columns:92px 1fr;gap:8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 6px 16px rgba(31,41,55,.04);backdrop-filter:blur(8px)}
.time-card{display:flex;align-items:center;justify-content:center;padding:10px;font-size:27px;font-weight:800}
.info-col{display:grid;gap:8px}
.info-card{padding:10px 12px}
.label{font-size:12px;color:var(--muted);font-weight:800;margin-bottom:4px}
.value{font-size:14px;font-weight:800;line-height:1.5}
.character-wrap{position:absolute;left:0;right:0;top:76px;bottom:168px;z-index:2;display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
.character-stage{position:relative;width:min(92vw,470px);height:100%;display:flex;align-items:flex-end;justify-content:center;animation:floaty 4.2s ease-in-out infinite}
.layer{position:absolute;inset:auto 0 0 0;margin:auto;max-width:100%;max-height:100%;width:100%;height:100%;object-fit:contain;object-position:center bottom;pointer-events:none;filter:drop-shadow(0 8px 20px rgba(0,0,0,.12))}
.eye-layer{animation:blink 4.6s infinite}
@keyframes floaty{0%{transform:translateY(0)}50%{transform:translateY(-5px)}100%{transform:translateY(0)}}
@keyframes blink{0%,46%,48%,100%{opacity:0}47%{opacity:1}}
.speech-wrap{position:absolute;left:12px;right:12px;bottom:108px;z-index:5}
.speech{position:relative;background:rgba(255,255,255,.96);border:1px solid #e8efff;border-radius:22px;padding:14px 16px;box-shadow:0 8px 18px rgba(31,41,55,.06);backdrop-filter:blur(10px)}
.speech::after{content:"";position:absolute;left:24px;bottom:-10px;width:18px;height:18px;background:rgba(255,255,255,.96);border-right:1px solid #e8efff;border-bottom:1px solid #e8efff;transform:rotate(45deg)}
.name{font-size:12px;color:var(--muted);font-weight:800;margin-bottom:5px}
.comment{font-size:16px;line-height:1.72;font-weight:800;white-space:pre-wrap;min-height:118px}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.badge{display:inline-flex;align-items:center;padding:7px 11px;border-radius:999px;border:1px solid var(--line);background:var(--soft);font-size:12px;font-weight:800}
.panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:14px;box-shadow:var(--shadow);height:100%;overflow:auto}
.panel-title{margin:0 0 8px;font-size:22px;font-weight:800}
.panel-sub{margin:0 0 14px;font-size:14px;line-height:1.7;color:var(--muted)}
.section{background:linear-gradient(180deg,#fbfdff,#f5f8ff);border:1px solid var(--line);border-radius:20px;padding:14px;margin-top:12px}
.section:first-of-type{margin-top:0}
.section-title{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:8px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:none;background:#fff;border:1px solid var(--line);color:var(--text);border-radius:999px;padding:10px 14px;font-weight:800}
.chip.active{background:var(--soft);border-color:#bdd0ff;color:#3454c6}
.note{font-size:13px;color:var(--muted);line-height:1.7}
.primary-btn,.danger-btn{border:none;border-radius:14px;padding:12px 16px;font-size:15px;font-weight:800}
.primary-btn{background:linear-gradient(90deg,#6d93ff,#7ea7ff);color:#fff;box-shadow:0 8px 18px rgba(91,124,255,.18)}
.danger-btn{background:#fff2f2;border:1px solid #ffcaca;color:#a33030}
.form-grid{display:grid;gap:10px}
input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;font-size:16px}
.list{display:grid;gap:10px}
.item{border:1px solid var(--line);border-radius:18px;padding:12px;background:#fff;display:grid;gap:6px}
.item-main{font-size:15px;font-weight:800}
.item-sub{font-size:14px;line-height:1.6}
.empty{font-size:13px;color:var(--muted);line-height:1.6}
.chat-log{display:grid;gap:10px;max-height:260px;overflow:auto;padding-right:4px}
.chat-row{display:flex;gap:8px;align-items:flex-end}
.chat-row.user{justify-content:flex-end}
.chat-bubble{max-width:82%;padding:12px 14px;border-radius:18px;line-height:1.75;font-size:15px;white-space:pre-wrap;box-shadow:0 4px 12px rgba(31,41,55,.04)}
.chat-bubble.mina{background:#fff;border:1px solid var(--line)}
.chat-bubble.user{background:var(--accent);color:#fff}
.chat-input-row{display:flex;gap:8px;margin-top:10px}
.chat-input-row input{flex:1;min-width:0}
.nav{position:fixed;left:0;right:0;bottom:0;z-index:10;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(245,247,251,.95);backdrop-filter:blur(12px);border-top:1px solid #dfe8ff}
.nav-inner{max-width:560px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.nav-btn{border:none;background:#fff;border:1px solid var(--line);color:var(--text);border-radius:16px;padding:10px 6px;box-shadow:0 6px 14px rgba(31,41,55,.04);display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;font-weight:800}
.nav-btn.active{background:linear-gradient(180deg,#eef4ff,#dfeaff);border-color:#bfd1ff;color:#3454c6}
.nav-ico{font-size:20px}
@media (max-width:520px){.comment{font-size:15px;min-height:132px}.value{font-size:13px}}
</style>
</head>
<body>
<div class="app">
<section id="screen-home" class="screen home-screen active">
  <div class="hero">
    <div id="bgLayer" class="bg-layer"></div>
    <div class="bg-overlay"></div>
    <div class="topbar">
      <div class="card time-card" id="clockText">08:34</div>
      <div class="info-col">
        <div class="card info-card">
          <div class="label">今日の予定</div>
          <div class="value" id="todaySummary">予定を確認中...</div>
        </div>
        <div class="card info-card">
          <div class="label">明日の予定</div>
          <div class="value" id="tomorrowSummary">予定を確認中...</div>
        </div>
      </div>
    </div>
    <div class="character-wrap">
      <div class="character-stage">
        <img id="bodyLayer" class="layer" alt="ミナ 服装">
        <img id="faceLayer" class="layer" alt="ミナ 表情">
        <img id="eyeLayer" class="layer eye-layer" alt="ミナ 瞬き">
      </div>
    </div>
    <div class="speech-wrap">
      <div class="speech">
        <div class="name">マネージャーミナ</div>
        <div class="comment" id="minaComment">読み込み中...</div>
        <div class="badges">
          <div class="badge" id="timeBadge">朝</div>
          <div class="badge" id="outfitBadge">服装：メイド</div>
          <div class="badge" id="faceBadge">表情：通常</div>
          <div class="badge" id="sceneBadge">背景：朝</div>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="screen-talk" class="screen">
  <div class="panel">
    <h2 class="panel-title">ボタン＋チャット会話</h2>
    <p class="panel-sub">ボタン会話に加えて、チャット入力でもミナが反応する版です。内容に応じて表情・服装・背景も変わるよ。</p>

    <div class="section">
      <div class="section-title">会話ボタン</div>
      <div class="chip-row">
        <button class="chip" onclick="talk('greet')">おはよう</button>
        <button class="chip" onclick="talk('praise')">褒めて</button>
        <button class="chip" onclick="talk('tired')">疲れた</button>
        <button class="chip" onclick="talk('study')">勉強したい</button>
        <button class="chip" onclick="talk('late')">サボった</button>
        <button class="chip" onclick="talk('sleepy')">眠い</button>
        <button class="chip" onclick="talk('sad')">落ち込んだ</button>
        <button class="chip" onclick="talk('rest')">家で休みたい</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">チャット</div>
      <div id="chatLog" class="chat-log"></div>
      <div class="chat-input-row">
        <input id="chatInput" type="text" placeholder="ミナに話しかける">
        <button class="primary-btn" onclick="sendChat()">送信</button>
      </div>
    </div>
  </div>
</section>

<section id="screen-style" class="screen">
  <div class="panel">
    <h2 class="panel-title">ミナの見た目</h2>
    <p class="panel-sub">ここでは手動で見た目を調整できるよ。会話後に自動で変わったあとでも上書きできる。</p>

    <div class="section">
      <div class="section-title">服装</div>
      <div class="chip-row">
        <button class="chip active" data-type="outfit" data-value="maid">メイド</button>
        <button class="chip" data-type="outfit" data-value="butler">執事</button>
        <button class="chip" data-type="outfit" data-value="sleep">寝巻き</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">表情</div>
      <div class="chip-row">
        <button class="chip active" data-type="face" data-value="normal">通常</button>
        <button class="chip" data-type="face" data-value="smile">笑顔</button>
        <button class="chip" data-type="face" data-value="angry">怒り</button>
        <button class="chip" data-type="face" data-value="sad">悲しみ</button>
        <button class="chip" data-type="face" data-value="sleepy">眠い</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">背景</div>
      <div class="chip-row">
        <button class="chip active" data-type="bg" data-value="morning">朝</button>
        <button class="chip" data-type="bg" data-value="day">昼</button>
        <button class="chip" data-type="bg" data-value="night">夜</button>
        <button class="chip" data-type="bg" data-value="room">部屋</button>
      </div>
    </div>
  </div>
</section>

<section id="screen-calendar" class="screen">
  <div class="panel">
    <h2 class="panel-title">予定・カレンダー</h2>
    <p class="panel-sub">日付・時間・内容を登録すると、ホームのミナコメントに今日と明日の予定が反映されるよ。</p>
    <div class="section">
      <div class="section-title">予定を追加</div>
      <div class="form-grid">
        <input id="planDate" type="date">
        <input id="planTime" type="time">
        <input id="planText" type="text" placeholder="予定内容を入力">
        <button class="primary-btn" onclick="addSchedule()">予定を保存</button>
      </div>
    </div>
    <div class="section">
      <div class="section-title">今日の予定</div>
      <div id="todayList" class="list"></div>
    </div>
    <div class="section">
      <div class="section-title">明日の予定</div>
      <div id="tomorrowList" class="list"></div>
    </div>
  </div>
</section>

</div>

<nav class="nav">
  <div class="nav-inner">
    <button class="nav-btn active" data-screen="home" onclick="openScreen('home')"><div class="nav-ico">🏠</div><div>ホーム</div></button>
    <button class="nav-btn" data-screen="talk" onclick="openScreen('talk')"><div class="nav-ico">💬</div><div>会話</div></button>
    <button class="nav-btn" data-screen="style" onclick="openScreen('style')"><div class="nav-ico">👗</div><div>見た目</div></button>
    <button class="nav-btn" data-screen="calendar" onclick="openScreen('calendar')"><div class="nav-ico">📅</div><div>予定</div></button>
  </div>
</nav>

<script>
const SCHEDULE_KEY = "mina_manager_schedules_v7";
const STYLE_KEY = "mina_manager_style_v5";

let schedules = loadSchedules();
let styleState = loadStyleState();

function loadSchedules(){ try{ return JSON.parse(localStorage.getItem(SCHEDULE_KEY)) || []; } catch(e){ return []; } }
function saveSchedules(){ localStorage.setItem(SCHEDULE_KEY, JSON.stringify(schedules)); }
function loadStyleState(){ try{ return JSON.parse(localStorage.getItem(STYLE_KEY)) || { outfit:"maid", face:"normal", bg:"morning" }; } catch(e){ return { outfit:"maid", face:"normal", bg:"morning" }; } }
function saveStyleState(){ localStorage.setItem(STYLE_KEY, JSON.stringify(styleState)); }

function openScreen(name){
  document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
  document.getElementById("screen-" + name).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));
  const target = document.querySelector('.nav-btn[data-screen="' + name + '"]');
  if(target) target.classList.add("active");
}
function updateClock(){
  const now = new Date();
  document.getElementById("clockText").textContent = String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
}
function getDateStr(offset = 0){
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function getTodayPlans(){ return schedules.filter(x => x.date === getDateStr(0)).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)); }
function getTomorrowPlans(){ return schedules.filter(x => x.date === getDateStr(1)).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)); }

function addSchedule(){
  const date = document.getElementById("planDate").value;
  const time = document.getElementById("planTime").value;
  const text = document.getElementById("planText").value.trim();
  if(!date || !time || !text){ alert("日付・時間・予定内容を入力してね。"); return; }
  schedules.push({ id:Date.now(), date, time, text });
  schedules.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  saveSchedules();
  document.getElementById("planText").value = "";
  renderSchedules();
  updateHomeComment();
}
function deleteSchedule(id){
  schedules = schedules.filter(x => x.id !== id);
  saveSchedules();
  renderSchedules();
  updateHomeComment();
}
function renderItem(item){
  const div = document.createElement("div");
  div.className = "item";
  div.innerHTML = `<div class="item-main">${item.date} ${item.time}</div><div class="item-sub">${item.text}</div><button class="danger-btn" onclick="deleteSchedule(${item.id})">削除</button>`;
  return div;
}
function renderSchedules(){
  const todayList = document.getElementById("todayList");
  const tomorrowList = document.getElementById("tomorrowList");
  todayList.innerHTML = ""; tomorrowList.innerHTML = "";
  const todayPlans = getTodayPlans();
  const tomorrowPlans = getTomorrowPlans();
  if(todayPlans.length === 0){ todayList.innerHTML = '<div class="empty">今日の予定はまだないよ。</div>'; } else { todayPlans.forEach(item => todayList.appendChild(renderItem(item))); }
  if(tomorrowPlans.length === 0){ tomorrowList.innerHTML = '<div class="empty">明日の予定はまだないよ。</div>'; } else { tomorrowPlans.forEach(item => tomorrowList.appendChild(renderItem(item))); }
  document.getElementById("todaySummary").textContent = todayPlans.length ? `${todayPlans[0].time} ${todayPlans[0].text}` : "今日は予定なし";
  document.getElementById("tomorrowSummary").textContent = tomorrowPlans.length ? `${tomorrowPlans[0].time} ${tomorrowPlans[0].text}` : "明日は予定なし";
}
function updateHomeComment(){
  const hour = new Date().getHours();
  const todayPlans = getTodayPlans();
  const tomorrowPlans = getTomorrowPlans();
  let greeting = "おはよう、マスター。";
  let timeLabel = "朝";
  if(hour >= 12 && hour < 18){ greeting = "こんにちは、マスター。"; timeLabel = "昼"; }
  else if(hour >= 18){ greeting = "こんばんは、マスター。"; timeLabel = "夜"; }
  document.getElementById("timeBadge").textContent = timeLabel;
  const outfitNames = { maid:"メイド", butler:"執事", sleep:"寝巻き" };
  const faceNames = { normal:"通常", smile:"笑顔", angry:"怒り", sad:"悲しみ", sleepy:"眠い" };
  const bgNames = { morning:"朝", day:"昼", night:"夜", room:"部屋" };
  document.getElementById("outfitBadge").textContent = "服装：" + outfitNames[styleState.outfit];
  document.getElementById("faceBadge").textContent = "表情：" + faceNames[styleState.face];
  document.getElementById("sceneBadge").textContent = "背景：" + bgNames[styleState.bg];
  const lines = [greeting];
  if(todayPlans.length){ lines.push(`今日は ${todayPlans[0].time} に「${todayPlans[0].text}」があるよ。`); } else { lines.push("今日はまだ予定が入っていないよ。"); }
  if(tomorrowPlans.length){ lines.push(`明日は ${tomorrowPlans[0].time} に「${tomorrowPlans[0].text}」があるから、今のうちに少し準備すると楽だよ。`); } else { lines.push("明日の予定はまだ空いているよ。"); }
  document.getElementById("minaComment").textContent = lines.join("\n");
}
function trySetImage(element, names){
  const candidates = [];
  names.forEach(base=>{
    candidates.push(base + ".png", base + ".PNG", base + ".jpg", base + ".JPG", base + ".jpeg", base + ".JPEG");
  });
  let index = 0;
  function loadNext(){
    if(index >= candidates.length) return;
    const src = candidates[index];
    const tester = new Image();
    tester.onload = function(){ element.src = src; };
    tester.onerror = function(){ index += 1; loadNext(); };
    tester.src = src;
  }
  loadNext();
}
function applyStyle(){
  const bodyMap = {
    maid: ["mina_maid", "mina-maid", "body_maid"],
    butler: ["mina_butler", "mina-butler", "body_butler"],
    sleep: ["mina_sleep", "mina-sleep", "body_sleep"]
  };
  const faceMap = {
    normal: ["face_normal", "mina_face_normal"],
    smile: ["face_smile", "mina_face_smile"],
    angry: ["face_angry", "mina_face_angry"],
    sad: ["face_sad", "mina_face_sad"],
    sleepy: ["face_sleepy", "mina_face_sleepy"]
  };
  const bgMap = { morning:["bg_morning"], day:["bg_day"], night:["bg_night"], room:["bg_room"] };
  trySetImage(document.getElementById("bodyLayer"), bodyMap[styleState.outfit]);
  trySetImage(document.getElementById("faceLayer"), faceMap[styleState.face]);
  trySetImage(document.getElementById("eyeLayer"), ["face_close", "mina_face_close", "face_blink"]);

  const bgEl = document.getElementById("bgLayer");
  const bgNames = bgMap[styleState.bg];
  const candidates = [];
  bgNames.forEach(base=>{
    candidates.push(base + ".png", base + ".PNG", base + ".jpg", base + ".JPG", base + ".jpeg", base + ".JPEG");
  });
  let i = 0;
  function loadBg(){
    if(i >= candidates.length){
      const fallback = {
        morning:"linear-gradient(180deg,#fff7ef,#e9f2ff 52%,#f9fbff)",
        day:"linear-gradient(180deg,#f4fbff,#dff6ea 55%,#f7fbff)",
        night:"linear-gradient(180deg,#24345e,#5d6fa3 58%,#e8eefb)",
        room:"linear-gradient(180deg,#f7f3ff,#edf2ff 55%,#f9fbff)"
      };
      bgEl.style.backgroundImage = "";
      bgEl.style.background = fallback[styleState.bg];
      return;
    }
    const src = candidates[i];
    const tester = new Image();
    tester.onload = function(){ bgEl.style.background = ""; bgEl.style.backgroundImage = `url('${src}')`; };
    tester.onerror = function(){ i += 1; loadBg(); };
    tester.src = src;
  }
  loadBg();
  document.querySelectorAll(".chip").forEach(btn => {
    if(btn.dataset.type){ btn.classList.toggle("active", styleState[btn.dataset.type] === btn.dataset.value); }
  });
  updateHomeComment();
}
function setScene(outfit, face, bg){
  styleState.outfit = outfit;
  styleState.face = face;
  styleState.bg = bg;
  saveStyleState();
  applyStyle();
}
function addChatMessage(role, text){
  const log = document.getElementById("chatLog");
  const row = document.createElement("div");
  row.className = "chat-row " + role;
  const bubble = document.createElement("div");
  bubble.className = "chat-bubble " + role;
  bubble.textContent = text;
  row.appendChild(bubble);
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
}
function clearIntroIfNeeded(){
  const log = document.getElementById("chatLog");
  if(log.children.length === 1 && log.firstChild && log.firstChild.textContent.includes("ボタンでもチャットでも話しかけてね")){
    log.innerHTML = "";
  }
}
function respond(payload){
  addChatMessage("mina", payload.text);
  setScene(payload.outfit, payload.face, payload.bg);
  openScreen("talk");
}
function talk(type){
  clearIntroIfNeeded();
  const todayPlans = getTodayPlans();
  const replies = {
    greet:{outfit:"maid",face:"smile",bg:"morning",text:"おはよう、マスター。\n今日の最初の一歩をいっしょに決めよう。"},
    praise:{outfit:"maid",face:"smile",bg:"day",text:"ちゃんと進もうとしてるの、ミナは見てるよ。\n大きく進めなくても、止まらなかった時点でかなり良い感じ。"},
    tired:{outfit:"maid",face:"sad",bg:"room",text:"疲れたね。\n今日は無理に全部やろうとしなくていいよ。\nいちばん軽い予定をひとつだけ終わらせよう。"},
    study:{outfit:"butler",face:"normal",bg:"day",text:todayPlans.length?`勉強いいね。\n今日は「${todayPlans[0].text}」もあるから、先に10分だけやると流れが作りやすいよ。`:"勉強いいね。\nまずは10分だけ始めよう。"},
    late:{outfit:"butler",face:"angry",bg:"night",text:"……少しサボっちゃったね。\nでも、ここで戻ればまだ立て直せるよ。\nまず5分だけやろう。"},
    sleepy:{outfit:"sleep",face:"sleepy",bg:"room",text:"眠いなら、無理しすぎはよくないよ。\n今日は早めに休むのも立派な判断。"},
    sad:{outfit:"maid",face:"sad",bg:"room",text:"落ち込んだ時は、無理に元気を出さなくていいよ。\n今日はミナがそばで整えるからね。"},
    rest:{outfit:"sleep",face:"smile",bg:"room",text:"うん、今日はお家で休もう。\n休むのも大事な予定だよ。"}
  };
  respond(replies[type]);
}
function analyzeChat(text){
  const t = text.trim();
  if(/疲|しんど|だる|つかれ/.test(t)) return {outfit:"maid",face:"sad",bg:"room",text:"疲れてるんだね。\n今日は頑張りすぎないで、いちばん軽いことをひとつだけ終わらせよう。"};
  if(/眠|ねむ/.test(t)) return {outfit:"sleep",face:"sleepy",bg:"room",text:"眠い時は、無理して続けても効率が落ちやすいよ。\n今日は早めに休んで、明日の自分を助けよう。"};
  if(/勉強|study|英語|itパスポート|ITパスポート/.test(t)) return {outfit:"butler",face:"normal",bg:"day",text:"いいね、勉強しよう。\nまずは10分だけでも始めよう。始めると流れができやすいよ。"};
  if(/サボ|やる気ない|だらだら/.test(t)) return {outfit:"butler",face:"angry",bg:"night",text:"……少し気が緩んでるかもね。\nでも今ここで戻れば大丈夫。\nまず5分だけやろう。"};
  if(/不安|こわ|怖/.test(t)) return {outfit:"butler",face:"sad",bg:"night",text:"不安な時は、全部を一気に見ない方がいいよ。\n今日やる分だけ見て、ひとつずつ進めよう。"};
  if(/落ち込|かなしい|悲しい|つらい/.test(t)) return {outfit:"maid",face:"sad",bg:"room",text:"そうなんだね。\n今は無理に元気を出さなくていいよ。\n深呼吸して、次の一歩はそのあとで考えよう。"};
  if(/褒め|できた|終わった|頑張った/.test(t)) return {outfit:"maid",face:"smile",bg:"day",text:"えらいよ。\nちゃんと進めたの、ミナはちゃんと見てる。\n今は少しだけ誇っていいよ。"};
  if(/休みたい|家で|のんびり/.test(t)) return {outfit:"sleep",face:"smile",bg:"room",text:"うん、今日は休む方向で整えよう。\nちゃんと休むのも前に進むために必要だよ。"};
  if(/おはよう|こんにちは|こんばんは/.test(t)) return {outfit:"maid",face:"smile",bg:"morning",text:"おはよう、マスター。\n今日も一緒に整えていこう。"};
  return {outfit:"maid",face:"normal",bg:"day",text:`うん、ちゃんと聞いてるよ。\n「${t}」ってことだね。\n今の状況なら、次の一歩をひとつだけ決めるのが良さそう。`};
}
function sendChat(){
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if(!text) return;
  clearIntroIfNeeded();
  addChatMessage("user", text);
  const reply = analyzeChat(text);
  addChatMessage("mina", reply.text);
  setScene(reply.outfit, reply.face, reply.bg);
  input.value = "";
  openScreen("talk");
}
document.addEventListener("click", (e) => {
  if(e.target.classList.contains("chip") && e.target.dataset.type){
    styleState[e.target.dataset.type] = e.target.dataset.value;
    saveStyleState();
    applyStyle();
  }
});
document.addEventListener("DOMContentLoaded", () => {
  updateClock();
  renderSchedules();
  applyStyle();
  document.getElementById("chatLog").innerHTML = "";
  addChatMessage("mina", "ボタンでもチャットでも話しかけてね。ミナが反応するよ。");
  document.getElementById("chatInput").addEventListener("keydown", (e) => {
    if(e.key === "Enter") sendChat();
  });
  setInterval(() => {
    updateClock();
    updateHomeComment();
  }, 30000);
});
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>マネージャーミナ</title>
<style>
:root{
  --bg:#f4f7fc;
  --card:#ffffff;
  --line:#dbe7ff;
  --text:#1f2937;
  --muted:#6b7280;
  --soft:#eef4ff;
  --accent:#6e93ff;
  --shadow:0 10px 24px rgba(31,41,55,.06);
  --navh:84px;
}
*{box-sizing:border-box}
html,body{
  margin:0;height:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
  background:var(--bg);color:var(--text);
}
body{min-height:100vh}
.app{
  max-width:560px;height:100vh;margin:0 auto;
  padding:10px 10px calc(var(--navh) + env(safe-area-inset-bottom) + 8px);
  display:flex;flex-direction:column;overflow:hidden;
}
.screen{display:none;height:100%;min-height:0}
.screen.active{display:flex}
.home-screen{flex-direction:column}
.hero{
  position:relative;flex:1;min-height:0;overflow:hidden;
  border-radius:28px;border:1px solid var(--line);box-shadow:var(--shadow);
  background:linear-gradient(180deg,#fbfdff,#edf4ff);
}
.bg{
  position:absolute;inset:0;
  background:linear-gradient(180deg,#fff7ef,#e9f2ff 52%,#f9fbff);
}
.home-inner{
  position:relative;z-index:2;height:100%;
  display:flex;flex-direction:column;gap:10px;padding:10px;
}
.top-row{
  display:grid;grid-template-columns:92px 1fr;gap:8px;
}
.card{
  background:rgba(255,255,255,.93);
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:0 6px 16px rgba(31,41,55,.04);
}
.time-card{
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:800;padding:10px;
}
.info-col{display:grid;gap:8px}
.info-card{padding:10px 12px}
.label{font-size:12px;color:var(--muted);font-weight:800;margin-bottom:4px}
.value{font-size:14px;font-weight:800;line-height:1.45}
.mina-wrap{
  flex:1;min-height:0;
  display:flex;align-items:flex-end;justify-content:center;
  overflow:hidden;
}
.mina{
  width:100%;max-width:500px;height:100%;
  display:flex;align-items:flex-end;justify-content:center;
}
.mina img{
  max-width:100%;max-height:100%;object-fit:contain;object-position:center bottom;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.14));
  animation:floaty 4.5s ease-in-out infinite;
}
@keyframes floaty{
  0%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
  100%{transform:translateY(0)}
}
.speech{
  position:relative;
  background:rgba(255,255,255,.96);
  border:1px solid #e8efff;
  border-radius:22px;
  padding:14px 16px;
  box-shadow:0 8px 18px rgba(31,41,55,.06);
}
.speech::after{
  content:"";position:absolute;left:24px;bottom:-10px;width:18px;height:18px;
  background:rgba(255,255,255,.96);
  border-right:1px solid #e8efff;border-bottom:1px solid #e8efff;
  transform:rotate(45deg);
}
.name{font-size:12px;color:var(--muted);font-weight:800;margin-bottom:5px}
.comment{font-size:16px;line-height:1.75;font-weight:800;white-space:pre-wrap;min-height:108px}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.badge{
  display:inline-flex;align-items:center;padding:7px 11px;border-radius:999px;
  border:1px solid var(--line);background:var(--soft);font-size:12px;font-weight:800;
}
.panel{
  background:#fff;border:1px solid var(--line);border-radius:24px;
  padding:14px;box-shadow:var(--shadow);height:100%;overflow:auto;
}
.panel-title{margin:0 0 8px;font-size:22px;font-weight:800}
.panel-sub{margin:0 0 14px;font-size:14px;line-height:1.7;color:var(--muted)}
.form-grid{display:grid;gap:10px}
input, select{
  width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--line);
  background:#fff;font-size:16px;
}
.primary-btn,.ghost-btn,.danger-btn{
  border:none;border-radius:14px;padding:12px 16px;font-size:15px;font-weight:800;
}
.primary-btn{background:linear-gradient(90deg,#6d93ff,#7ea7ff);color:#fff;box-shadow:0 8px 18px rgba(91,124,255,.18)}
.ghost-btn{background:#fff;border:1px solid var(--line);color:var(--text)}
.danger-btn{background:#fff2f2;border:1px solid #ffcaca;color:#a33030}
.row{display:flex;gap:8px;flex-wrap:wrap}
.section-card{
  background:linear-gradient(180deg,#fbfdff,#f5f8ff);
  border:1px solid var(--line);border-radius:20px;padding:14px;margin-top:12px;
}
.small-label{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:8px}
.schedule-list{display:grid;gap:10px}
.schedule-item{
  border:1px solid var(--line);border-radius:18px;padding:12px;background:#fff;
  display:grid;gap:6px;
}
.schedule-main{font-size:15px;font-weight:800}
.schedule-sub{font-size:14px;line-height:1.6}
.empty{font-size:13px;color:var(--muted);line-height:1.6}
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:10;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:rgba(245,247,251,.95);backdrop-filter:blur(12px);border-top:1px solid #dfe8ff;
}
.nav-inner{
  max-width:560px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.nav-btn{
  border:none;background:#fff;border:1px solid var(--line);color:var(--text);
  border-radius:16px;padding:10px 6px;box-shadow:0 6px 14px rgba(31,41,55,.04);
  display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;font-weight:800;
}
.nav-btn.active{background:linear-gradient(180deg,#eef4ff,#dfeaff);border-color:#bfd1ff;color:#3454c6}
.nav-ico{font-size:20px}
@media (max-width:520px){
  .comment{font-size:15px;min-height:122px}
  .value{font-size:13px}
}
</style>
</head>
<body>
<div class="app">

  <section id="screen-home" class="screen home-screen active">
    <div class="hero">
      <div class="bg" id="homeBg"></div>
      <div class="home-inner">
        <div class="top-row">
          <div class="card time-card" id="clockText">08:34</div>
          <div class="info-col">
            <div class="card info-card">
              <div class="label">今日の予定</div>
              <div class="value" id="todaySummary">予定を確認中...</div>
            </div>
            <div class="card info-card">
              <div class="label">明日の予定</div>
              <div class="value" id="tomorrowSummary">予定を確認中...</div>
            </div>
          </div>
        </div>

        <div class="mina-wrap">
          <div class="mina">
            <img id="minaImage" src="" alt="ミナ">
          </div>
        </div>

        <div class="speech">
          <div class="name">マネージャーミナ</div>
          <div class="comment" id="minaComment">読み込み中...</div>
          <div class="badges">
            <div class="badge" id="timeBadge">朝</div>
            <div class="badge">予定連動</div>
            <div class="badge">ローカル保存</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="screen-calendar" class="screen">
    <div class="panel">
      <h2 class="panel-title">予定・カレンダー</h2>
      <p class="panel-sub">日付・時間・内容を登録すると、ホームのミナコメントに今日と明日の予定が反映されるよ。</p>

      <div class="section-card">
        <div class="small-label">予定を追加</div>
        <div class="form-grid">
          <input id="planDate" type="date">
          <input id="planTime" type="time">
          <input id="planText" type="text" placeholder="予定内容を入力">
          <button class="primary-btn" onclick="addSchedule()">予定を保存</button>
        </div>
      </div>

      <div class="section-card">
        <div class="small-label">今日の予定</div>
        <div id="todayList" class="schedule-list"></div>
      </div>

      <div class="section-card">
        <div class="small-label">明日の予定</div>
        <div id="tomorrowList" class="schedule-list"></div>
      </div>

      <div class="section-card">
        <div class="small-label">すべての予定</div>
        <div id="allList" class="schedule-list"></div>
      </div>
    </div>
  </section>

  <section id="screen-note" class="screen">
    <div class="panel">
      <h2 class="panel-title">次の更新候補</h2>
      <p class="panel-sub">この版では予定機能とホーム連動コメントを強化しています。</p>
      <div class="section-card">
        <div class="small-label">次に入れると強いもの</div>
        <div class="schedule-list">
          <div class="schedule-item">
            <div class="schedule-main">会話機能の充実</div>
            <div class="schedule-sub">気分別の返答、勉強モード、励ましモードを追加。</div>
          </div>
          <div class="schedule-item">
            <div class="schedule-main">ミナのアニメーション</div>
            <div class="schedule-sub">瞬き、呼吸、表情変化を追加。</div>
          </div>
          <div class="schedule-item">
            <div class="schedule-main">通知っぽいコメント</div>
            <div class="schedule-sub">予定1時間前などにホームコメントを変える。</div>
          </div>
        </div>
      </div>
    </div>
  </section>

</div>

<nav class="nav">
  <div class="nav-inner">
    <button class="nav-btn active" data-screen="home" onclick="openScreen('home')">
      <div class="nav-ico">🏠</div><div>ホーム</div>
    </button>
    <button class="nav-btn" data-screen="calendar" onclick="openScreen('calendar')">
      <div class="nav-ico">📅</div><div>予定</div>
    </button>
    <button class="nav-btn" data-screen="note" onclick="openScreen('note')">
      <div class="nav-ico">✨</div><div>次へ</div>
    </button>
  </div>
</nav>

<script>
const STORAGE_KEY = "mina_manager_schedules_v2";

let schedules = loadSchedules();

function loadSchedules(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }catch(e){
    return [];
  }
}
function saveSchedules(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(schedules));
}
function openScreen(name){
  document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
  document.getElementById("screen-" + name).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));
  const target = document.querySelector('.nav-btn[data-screen="' + name + '"]');
  if(target) target.classList.add("active");
}
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2, "0");
  const m = String(now.getMinutes()).padStart(2, "0");
  document.getElementById("clockText").textContent = h + ":" + m;
}
function getDateStr(offset = 0){
  const d = new Date();
  d.setDate(d.getDate() + offset);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function getTodayPlans(){
  return schedules.filter(x => x.date === getDateStr(0))
    .sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));
}
function getTomorrowPlans(){
  return schedules.filter(x => x.date === getDateStr(1))
    .sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));
}
function addSchedule(){
  const date = document.getElementById("planDate").value;
  const time = document.getElementById("planTime").value;
  const text = document.getElementById("planText").value.trim();

  if(!date || !time || !text){
    alert("日付・時間・予定内容を入力してね。");
    return;
  }

  schedules.push({
    id: Date.now(),
    date, time, text
  });
  schedules.sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));
  saveSchedules();

  document.getElementById("planText").value = "";

  renderSchedules();
  updateHomeComment();
}
function deleteSchedule(id){
  schedules = schedules.filter(x => x.id !== id);
  saveSchedules();
  renderSchedules();
  updateHomeComment();
}
function renderItem(item){
  const div = document.createElement("div");
  div.className = "schedule-item";
  div.innerHTML = `
    <div class="schedule-main">${item.date} ${item.time}</div>
    <div class="schedule-sub">${item.text}</div>
    <div class="row">
      <button class="danger-btn" onclick="deleteSchedule(${item.id})">削除</button>
    </div>
  `;
  return div;
}
function renderSchedules(){
  const todayList = document.getElementById("todayList");
  const tomorrowList = document.getElementById("tomorrowList");
  const allList = document.getElementById("allList");
  todayList.innerHTML = "";
  tomorrowList.innerHTML = "";
  allList.innerHTML = "";

  const todayPlans = getTodayPlans();
  const tomorrowPlans = getTomorrowPlans();

  if(todayPlans.length === 0){
    todayList.innerHTML = '<div class="empty">今日の予定はまだないよ。</div>';
  }else{
    todayPlans.forEach(item => todayList.appendChild(renderItem(item)));
  }

  if(tomorrowPlans.length === 0){
    tomorrowList.innerHTML = '<div class="empty">明日の予定はまだないよ。</div>';
  }else{
    tomorrowPlans.forEach(item => tomorrowList.appendChild(renderItem(item)));
  }

  if(schedules.length === 0){
    allList.innerHTML = '<div class="empty">まだ予定は保存されていません。</div>';
  }else{
    schedules.forEach(item => allList.appendChild(renderItem(item)));
  }

  document.getElementById("todaySummary").textContent =
    todayPlans.length ? `${todayPlans[0].time} ${todayPlans[0].text}` : "今日は予定なし";
  document.getElementById("tomorrowSummary").textContent =
    tomorrowPlans.length ? `${tomorrowPlans[0].time} ${tomorrowPlans[0].text}` : "明日は予定なし";
}
function updateHomeComment(){
  const hour = new Date().getHours();
  const todayPlans = getTodayPlans();
  const tomorrowPlans = getTomorrowPlans();

  let greeting = "おはよう、マスター。";
  let timeLabel = "朝";
  let bg = "linear-gradient(180deg,#fff7ef,#e9f2ff 52%,#f9fbff)";

  if(hour >= 12 && hour < 18){
    greeting = "こんにちは、マスター。";
    timeLabel = "昼";
    bg = "linear-gradient(180deg,#f4fbff,#dff6ea 55%,#f7fbff)";
  }else if(hour >= 18){
    greeting = "こんばんは、マスター。";
    timeLabel = "夜";
    bg = "linear-gradient(180deg,#24345e,#5d6fa3 58%,#e8eefb)";
  }

  document.getElementById("timeBadge").textContent = timeLabel;
  document.getElementById("homeBg").style.background = bg;

  let lines = [greeting];

  if(todayPlans.length){
    if(todayPlans.length === 1){
      lines.push(`今日は ${todayPlans[0].time} に「${todayPlans[0].text}」があるよ。`);
    }else{
      lines.push(`今日は予定が ${todayPlans.length} 件あるよ。最初は ${todayPlans[0].time} の「${todayPlans[0].text}」だね。`);
    }
  }else{
    lines.push("今日はまだ予定が入っていないよ。");
  }

  if(tomorrowPlans.length){
    lines.push(`明日は ${tomorrowPlans[0].time} に「${tomorrowPlans[0].text}」があるから、今のうちに少し準備すると楽だよ。`);
  }else{
    lines.push("明日の予定はまだ空いているよ。");
  }

  const now = new Date();
  const upcoming = todayPlans.find(p => {
    const d = new Date(`${p.date}T${p.time}`);
    const diff = d - now;
    return diff > 0 && diff <= 60 * 60 * 1000;
  });

  if(upcoming){
    lines.push(`あと1時間以内に「${upcoming.text}」があるから、そろそろ準備しよう。`);
  }else if(todayPlans.length){
    lines.push("最初の予定だけ先に片づけると、今日はかなり動きやすくなるよ。");
  }else{
    lines.push("今日は余白があるから、休むか勉強するか、ひとつだけ決めよう。");
  }

  document.getElementById("minaComment").textContent = lines.join("\n");
}
function trySetImage(element, baseName){
  const candidates = [
    baseName + ".png",
    baseName + ".PNG",
    baseName + ".jpg",
    baseName + ".JPG",
    baseName + ".jpeg",
    baseName + ".JPEG"
  ];
  let index = 0;
  function loadNext(){
    if(index >= candidates.length) return;
    const src = candidates[index];
    const tester = new Image();
    tester.onload = function(){ element.src = src; };
    tester.onerror = function(){ index += 1; loadNext(); };
    tester.src = src;
  }
  loadNext();
}

document.addEventListener("DOMContentLoaded", () => {
  trySetImage(document.getElementById("minaImage"), "mina");
  updateClock();
  renderSchedules();
  updateHomeComment();
  setInterval(() => {
    updateClock();
    updateHomeComment();
  }, 30000);
});
</script>
</body>
</html>
